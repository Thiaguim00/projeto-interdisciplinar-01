<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock.tech - Template Base</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- MENU LATERAL -->
    <nav class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-box-archive"></i>
            <h2 class="logo-text">Stock<span>.tech</span></h2>
        </div>

        <div class="menu-container">

            <!-- VISÃO GERAL -->
            <div class="categoria">

                <p class="titulo-categoria">Visão Geral</p>

                <ul>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-money-bill-wave"></i>
                            <span>Financeiro</span>
                        </a>
                    </li>

                </ul>

            </div>

            <!-- ESTOQUE -->
            <div class="categoria">

                <p class="titulo-categoria">Estoque</p>

                <ul>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-truck-ramp-box"></i>
                            <span>Movimentações</span>
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-box-open"></i>
                            <span>Produtos</span>
                        </a>
                    </li>

                </ul>

            </div>

            <!-- COMERCIAL -->
            <div class="categoria">

                <p class="titulo-categoria">Comercial</p>

                <ul>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span>Pedido de Vendas</span>
                        </a>
                    </li>

                    <li>
                        <a href="./contatos.html"
                           target="frameConteudo"
                           onclick="salvarPagina('./contatos.html')">
                            <i class="fa-solid fa-address-book"></i>
                            <span>Contatos</span>
                        </a>
                    </li>

                </ul>

            </div>

            <!-- SUPORTE -->
            <div class="categoria">

                <p class="titulo-categoria">Suporte</p>

                <ul>

                    <li>
                        <a href="#" onclick="limparFrame()">
                            <i class="fa-solid fa-circle-question"></i>
                            <span>FAQ</span>
                        </a>
                    </li>

                </ul>

            </div>

        </div>

        <div class="sidebar-footer">

            <a href="#" class="btn-sair">

                <i class="fa-solid fa-right-from-bracket"></i>

                <span>Desconectar</span>

            </a>

        </div>

    </nav>

    <!-- CONTEÚDO -->
    <main class="content">

        <header>

            <h1>Stock.tech</h1>

            <p>Sistema de gerenciamento de estoque e contatos.</p>

        </header>

        <hr>

        <section class="page-body">

            <iframe
                id="frameConteudo"
                name="frameConteudo"
                class="frame-conteudo"
                src="">
            </iframe>

        </section>

    </main>

    <script>

        const frame = document.getElementById("frameConteudo");

        function salvarPagina(pagina) {

            localStorage.setItem("paginaAtual", pagina);

        }

        function limparFrame() {

            frame.src = "";

            localStorage.removeItem("paginaAtual");

        }

        window.onload = function () {

            const pagina = localStorage.getItem("paginaAtual");

            if (pagina) {

                frame.src = pagina;

            }

        };

    </script>

</body>

</html>
